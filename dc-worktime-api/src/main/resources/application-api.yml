spring:
  main:
    allow-circular-references: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://172.168.95.9:3306/dc_schedule?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: rjgs@2016
    # 是否打开sql监控台  (生产环境请务必关闭此选项)
    druid:
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 10000
      test-while-idle: true
      time-between-eviction-runs-millis: 10000
      # 显式设置验证查询
      validation-query: SELECT 1
      # 连接保持空闲而不被驱逐的最小时间
      min-evictable-idle-time-millis: 60000
      # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
      filters: stat,wall
      filter:
        stat:
          enabled: true
          db-type: mysql
          merge-sql: false
          slow-sql-millis: 1000
          log-slow-sql: false
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connectionProperties: druid.stat.mergeSql\=true;druid.stat.slowSqlMillis\=5000
      # 配置监控服务器
      stat-view-servlet:
        login-username: admin
        login-password: jsdc0516
        reset-enable: true
        url-pattern: /druid/*
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
  # redis配置
  redis:
    # Redis数据库索引（默认为0）
    database: 5
    # Redis服务器地址
    host: 172.168.95.9
    # Redis服务器连接端口
    port: 6379
    # Redis服务器连接密码（默认为空）
    password: 111111
    # 连接超时时间（毫秒）
    timeout: 5000ms
    lettuce:
      pool:
        # 连接池最大连接数
        max-active: 200
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 10
        # 连接池中的最小空闲连接
        min-idle: 0

  myconfig:
    # md5的盐
    md5-salt: whatclickme
    # 是否明文存储密码
    is-pw: true
    # 是否彩色SQl日志
    color-sql: true
    # 是否抛出SQL（将sql报错抛出到前端，方便调试，请只在开发环境打开，在生产模式请关闭）
    throw-sql: false
    # 是否把API请求日志输出在控制台
    log-to-file: false
    # 是否把API请求日志记录在数据库
    log-to-db: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  config:
    import:  classpath:formula-config.yml


# mybatis-plus配置
mybatis-plus:
  # 一些配置
  configuration:
    # 控制打印sql
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 是否开启下划线转驼峰
    map-underscore-to-camel-case: false
    # 即使属性为null, 也要映射
    call-setters-on-nulls: true


